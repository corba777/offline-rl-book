title: "Offline RL: From Theory to Industrial Practice"
description: "A practical guide to offline reinforcement learning — from behavioral cloning to physics-informed control."
url: "https://corba777.github.io"
baseurl: "/offline-rl-book"

github_username: corba777
github_repo: offline-rl-book

theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap

markdown: kramdown
kramdown:
  math_engine: mathjax
  input: GFM
  syntax_highlighter: rouge

highlighter: rouge

mathjax: true

header_pages:
  - index.md

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
